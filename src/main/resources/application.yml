spring:
  profiles:
    include: secret
  flyway:
    enabled: true
    baseline-on-migrate: false
    repair-on-migrate: true
  datasource:
    url: jdbc:mysql://localhost:3306/chatbot_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
    username: ssafy
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 2048

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.chatbot.backend.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

ai:
  server:
    url: http://localhost:8000

jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000

chat:
  cleanup:
    retention-days: 90

cors:
  allowed-origins: http://localhost:5173,http://localhost:5174

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,prometheus,info,circuitbreakers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: haruroute-backend

resilience4j:
  circuitbreaker:
    instances:
      ai-server:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

